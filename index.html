<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登録前チェックリスト</title>
    
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f2f2f7;
            margin: 0;
            padding: 10px 20px 20px 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            background: #ffffff;
            width: 100%;
            max-width: 600px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 24px;
            box-sizing: border-box;
        }
        
        h1 { color: #1e90ff; text-align: center; margin-bottom: 8px; font-size: 24px; }
        .desc1 { color: #696969; text-align: center; font-size: 15px; font-weight: bold; margin: 0; }
        .desc2 { color: #a9a9a9; text-align: center; font-size: 11px; margin-top: 5px; margin-bottom: 20px; line-height: 1.4; }
        .opt-word { color: #ffa500; font-weight: bold; }

        /* タブUI */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: #f2f2f7;
            padding: 6px;
            border-radius: 12px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 5px;
            background: transparent;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            color: #8e8e93;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tab.active {
            background: #ffffff;
            color: #1e90ff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        /* お客様名入力エリア */
        .name-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            gap: 8px;
        }
        .name-input {
            font-size: 18px;
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #d0d0d0;
            width: 160px;
            text-align: center;
            font-family: inherit;
        }
        .name-input:focus {
            outline: none;
            border-color: #1e90ff;
            box-shadow: 0 0 5px rgba(30, 144, 255, 0.3);
        }
        .name-suffix { font-size: 18px; font-weight: bold; color: #333; }

        /* タイマー */
        .timer-container {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #e9ecef;
        }
        .timer-label { font-size: 14px; color: #666; margin-bottom: 4px; }
        .timer-display { font-size: 28px; font-weight: bold; color: #333; margin-bottom: 12px; }
        .timer-btns { display: flex; justify-content: center; gap: 10px; }
        .btn-timer { border: none; padding: 10px 25px; border-radius: 8px; font-size: 16px; font-weight: bold; color: white; cursor: pointer; }
        .btn-start { background-color: #4682b4; }
        .btn-stop { background-color: #696969; }

        /* リスト */
        .section-title { font-size: 16px; font-weight: bold; color: #555; margin-top: 25px; margin-bottom: 10px; border-bottom: 2px solid #f0f0f0; padding-bottom: 5px; }
        .checklist { display: flex; flex-direction: column; gap: 10px; }
        .check-item { display: flex; align-items: center; padding: 14px; background: #f8f9fa; border-radius: 10px; font-size: 16px; font-weight: bold; color: #333; }
        .check-item input { transform: scale(1.6); margin-right: 15px; accent-color: #1e90ff; }
        .optional { color: #ffa500; }
        .optional input { accent-color: #ffa500; }

        /* メモ */
        .memo-container { margin-top: 25px; }
        .memo-input {
            width: 100%; height: 100px; padding: 12px; border-radius: 10px; border: 1px solid #d0d0d0;
            font-size: 16px; box-sizing: border-box; resize: none; font-family: inherit;
        }

        /* 進捗 */
        #status-msg { text-align: center; margin-top: 20px; font-weight: bold; min-height: 24px; }
        .progress-area { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-top: 10px; }
        .progress-text { font-size: 14px; font-weight: bold; margin-bottom: 8px; text-align: right; }
        .progress-bar-bg { width: 100%; background: #e0e0e0; border-radius: 10px; height: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: #1e90ff; width: 0%; transition: width 0.4s ease; }

        /* リセット */
        .reset-container { margin-top: 30px; text-align: center; }
        .reset-msg { font-size: 14px; font-weight: bold; margin-bottom: 10px; }
        .btn-reset { width: 100%; background: #b22222; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: bold; }

        .footer { text-align: center; font-size: 10px; color: #bbb; margin-top: 30px; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>登録前チェックリスト</h1>
    <p class="desc1">ご提案したこと、お伝えしたことに<br>チェックを入れてください</p>
    <p class="desc2">(<span class="opt-word">オプション項目</span>は必須ではないので<br>チェックしてもしなくても進捗に反映されません。)</p>

    <div class="tabs">
        <div class="tab active" onclick="switchTab(0)" id="tab-btn-0">お客様 1</div>
        <div class="tab" onclick="switchTab(1)" id="tab-btn-1">お客様 2</div>
        <div class="tab" onclick="switchTab(2)" id="tab-btn-2">お客様 3</div>
    </div>

    <div class="name-container">
        <input type="text" id="customer-name" class="name-input" placeholder="カタカナで名字のみ">
        <span class="name-suffix">様</span>
    </div>

    <div class="timer-container">
        <div class="timer-label">接客時間</div>
        <div id="time-display" class="timer-display">00:00</div>
        <div class="timer-btns">
            <button class="btn-timer btn-start" id="btn-start" onclick="toggleTimer(true)">開始</button>
            <button class="btn-timer btn-stop" onclick="stopTimerBtn()">終了</button>
        </div>
    </div>

    <div class="section-title">事前確認</div>
    <div class="checklist">
        <label class="check-item"><input type="checkbox" class="cb" value="pre1"> GL / インカム報告</label>
    </div>

    <div class="section-title">必須項目</div>
    <div class="checklist">
        <label class="check-item"><input type="checkbox" class="cb req" value="r1"> キャッシュカード/クレジットカードの所持</label>
        <label class="check-item"><input type="checkbox" class="cb req" value="r2"> 身分証明書の所持</label>
        <label class="check-item"><input type="checkbox" class="cb req" value="r3"> メール持ち運びの有無</label>
        <label class="check-item"><input type="checkbox" class="cb req" value="r4"> 頭金の説明</label>
        <label class="check-item"><input type="checkbox" class="cb req" value="r5"> 事務手数料の説明</label>
        <label class="check-item"><input type="checkbox" class="cb req" value="r6"> データ移行のご提案</label>
        <label class="check-item"><input type="checkbox" class="cb req" value="r7"> 補償のご提案</label>
        <label class="check-item"><input type="checkbox" class="cb req" value="r8"> 同意書登録</label>
    </div>

    <div class="section-title">【オプション】</div>
    <div class="checklist">
        <label class="check-item optional"><input type="checkbox" class="cb" value="o1"> ノートンのご提案</label>
        <label class="check-item optional"><input type="checkbox" class="cb" value="o2"> でんきのご提案</label>
    </div>

    <div class="memo-container">
        <textarea id="memo" class="memo-input" placeholder="メモしたいことを入力してください"></textarea>
    </div>

    <div id="status-msg"></div>
    <div class="progress-area">
        <div class="progress-text">進捗: <span id="percent">0</span>%</div>
        <div class="progress-bar-bg"><div id="bar" class="progress-bar-fill"></div></div>
    </div>

    <div class="reset-container">
        <p class="reset-msg">使い終わったらリセットボタンを押してください</p>
        <button class="btn-reset" onclick="manualReset()">一括リセット</button>
    </div>

    <div class="footer">染谷作成</div>
</div>

<script>
    let currentTab = 0;
    let customers = [
        { name: "", timerActive: false, seconds: 0, checks: {}, memo: "" },
        { name: "", timerActive: false, seconds: 0, checks: {}, memo: "" },
        { name: "", timerActive: false, seconds: 0, checks: {}, memo: "" }
    ];

    const savedData = localStorage.getItem('someya_multi_app');
    if (savedData) { customers = JSON.parse(savedData); }

    const nameInput = document.getElementById('customer-name');
    const memoInput = document.getElementById('memo');
    const allCheckboxes = document.querySelectorAll('.cb');
    const btnStart = document.getElementById('btn-start');
    const timeDisplay = document.getElementById('time-display');

    // ▼ カナ入力の強制制御 ▼
    nameInput.addEventListener('input', function() {
        // 入力された瞬間に「ひらがな」を「カタカナ」に置換
        let val = this.value.replace(/[\u3041-\u3096]/g, match => String.fromCharCode(match.charCodeAt(0) + 0x60));
        // カタカナ・長音（ー）以外をすべて即座に消去
        val = val.replace(/[^ァ-ヶー]/g, '');
        this.value = val;
        saveData();
    });

    function saveData() {
        let c = customers[currentTab];
        c.name = nameInput.value;
        c.memo = memoInput.value;
        allCheckboxes.forEach(cb => { c.checks[cb.value] = cb.checked; });
        localStorage.setItem('someya_multi_app', JSON.stringify(customers));
        updateTabNames();
    }

    function renderTab() {
        let c = customers[currentTab];
        nameInput.value = c.name;
        memoInput.value = c.memo;
        allCheckboxes.forEach(cb => { cb.checked = !!c.checks[cb.value]; });
        for (let i = 0; i < 3; i++) {
            const t = document.getElementById('tab-btn-' + i);
            t.className = i === currentTab ? 'tab active' : 'tab';
        }
        btnStart.style.backgroundColor = c.timerActive ? "#3cb371" : "#4682b4";
        btnStart.innerText = c.timerActive ? "計測中" : "開始";
        updateTimeDisplay(c.seconds);
        updateProgress();
        updateTabNames();
    }

    window.switchTab = function(index) {
        saveData();
        currentTab = index;
        renderTab();
    };

    function updateTabNames() {
        for (let i = 0; i < 3; i++) {
            const t = document.getElementById('tab-btn-' + i);
            const n = customers[i].name;
            t.innerText = n ? n + " 様" : "お客様 " + (i + 1);
        }
    }

    memoInput.addEventListener('input', saveData);
    allCheckboxes.forEach(cb => {
        cb.addEventListener('change', () => { saveData(); updateProgress(); });
    });

    setInterval(() => {
        let needsSave = false;
        customers.forEach(c => {
            if (c.timerActive) { c.seconds++; needsSave = true; }
        });
        if (needsSave) {
            updateTimeDisplay(customers[currentTab].seconds);
            localStorage.setItem('someya_multi_app', JSON.stringify(customers));
        }
    }, 1000);

    function updateTimeDisplay(sec) {
        const m = Math.floor(sec / 60).toString().padStart(2, '0');
        const s = (sec % 60).toString().padStart(2, '0');
        timeDisplay.innerText = `${m}:${s}`;
    }

    window.toggleTimer = function(forceStart = false) {
        let c = customers[currentTab];
        if (forceStart && c.timerActive) return;
        c.timerActive = forceStart;
        saveData();
        renderTab();
    };

    window.stopTimerBtn = function() {
        let c = customers[currentTab];
        c.timerActive = false;
        saveData();
        renderTab();
        if (confirm("お疲れ様でした！全てリセットしますか？")) {
            resetCurrentData();
        }
    };

    function updateProgress() {
        const reqs = document.querySelectorAll('.req');
        const checked = document.querySelectorAll('.req:checked').length;
        const percent = Math.floor((checked / reqs.length) * 100);
        document.getElementById('percent').innerText = percent;
        document.getElementById('bar').style.width = percent + '%';
        const msg = document.getElementById('status-msg');
        if (checked === 0) { msg.innerText = ""; }
        else if (checked < reqs.length) { msg.innerText = "チェック漏れがあります。確認してください"; msg.style.color = "#b22222"; }
        else { msg.innerText = "全てチェック済です。お疲れ様でした。"; msg.style.color = "#4682b4"; }
    }

    function resetCurrentData() {
        // データを初期化
        customers[currentTab] = { name: "", timerActive: false, seconds: 0, checks: {}, memo: "" };
        
        // 画面の入力欄を明示的に空にする
        nameInput.value = "";
        memoInput.value = "";
        
        // 保存して再描画
        saveData();
        renderTab();
        window.scrollTo(0,0);
    }

    window.manualReset = function() {
        if(confirm("お疲れ様でした。全てリセットして次の接客の準備をしますか？\n（現在開いているお客様のデータのみ消去されます）")) {
            resetCurrentData();
        }
    };

    window.onload = () => { renderTab(); };
</script>
</body>
</html>
