<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登録前チェックリスト</title>
    
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f2f2f7;
            margin: 0;
            padding: 10px 20px 20px 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            background: #ffffff;
            width: 100%;
            max-width: 600px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 24px;
            box-sizing: border-box;
        }
        
        h1 { color: #1e90ff; text-align: center; margin-bottom: 8px; font-size: 24px; }
        .desc1 { color: #696969; text-align: center; font-size: 15px; font-weight: bold; margin: 0; }
        
        /* 赤字の注意書き */
        .warning-text { color: #e60000; text-align: center; font-size: 13px; font-weight: bold; margin: 12px 0; line-height: 1.5; }
        
        .desc2 { color: #a9a9a9; text-align: center; font-size: 11px; margin-top: 5px; margin-bottom: 20px; line-height: 1.4; }
        .opt-word { color: #ffa500; font-weight: bold; }
        .split-word { color: #4682b4; font-weight: bold; }

        /* タブUI */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: #f2f2f7;
            padding: 6px;
            border-radius: 12px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 5px;
            background: transparent;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            color: #8e8e93;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tab.active {
            background: #ffffff;
            color: #1e90ff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        /* お客様名入力エリア */
        .name-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            gap: 8px;
        }
        .name-input {
            font-size: 18px;
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #d0d0d0;
            width: 160px;
            text-align: center;
            font-family: inherit;
        }
        .name-input:focus {
            outline: none;
            border-color: #1e90ff;
            box-shadow: 0 0 5px rgba(30, 144, 255, 0.3);
        }
        .name-suffix { font-size: 18px; font-weight: bold; color: #333; }

        /* タイマー */
        .timer-container {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #e9ecef;
        }
        .timer-label { font-size: 14px; color: #666; margin-bottom: 4px; }
        .timer-display { font-size: 28px; font-weight: bold; color: #333; margin-bottom: 12px; }
        .timer-btns { display: flex; justify-content: center; gap: 10px; }
        .btn-timer { border: none; padding: 10px 25px; border-radius: 8px; font-size: 16px; font-weight: bold; color: white; cursor: pointer; }
        .btn-start { background-color: #4682b4; }
        .btn-stop { background-color: #696969; }

        /* リスト共通設定 */
        .section-title { font-size: 16px; font-weight: bold; color: #555; margin-top: 25px; margin-bottom: 10px; border-bottom: 2px solid #f0f0f0; padding-bottom: 5px; }
        .checklist { display: flex; flex-direction: column; gap: 10px; }
        .check-item { display: flex; align-items: center; padding: 14px; background: #f8f9fa; border-radius: 10px; font-size: 16px; font-weight: bold; color: #333; }
        .check-item input { transform: scale(1.6); margin-right: 15px; accent-color: #1e90ff; }
        
        .split-item { color: #4682b4 !important; }
        .split-item input { accent-color: #4682b4 !important; }
        
        /* BB項目の文字色とチェックボックス色 */
        .bb-item { color: #3cb371 !important; }
        .bb-item input { accent-color: #3cb371 !important; }
        
        .optional { color: #ffa500; }
        .optional input { accent-color: #ffa500; }

        /* 横並び選択ボタングループ（補償・データ移行） */
        .decision-group {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .decision-title {
            font-size: 14px;
            font-weight: bold;
            color: #555;
            margin-bottom: 8px;
            text-align: center;
        }
        .radio-row {
            display: flex;
            flex-wrap: wrap; /* 複数行に折り返すように追加 */
            gap: 6px; /* 隙間を調整 */
        }
        .radio-label {
            flex: 1 1 30%; /* 1行に3つ入るように調整 */
            text-align: center;
            box-sizing: border-box;
        }
        .radio-label input {
            display: none; /* デフォルトの丸/四角ボタンを隠す */
        }
        .radio-label span {
            display: block;
            padding: 10px 2px; 
            background: #ffffff;
            border: 2px solid #d0d0d0;
            border-radius: 8px;
            font-size: 11px; 
            font-weight: bold;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        /* 選択された時のデザイン（ラジオボタン・チェックボックス共通） */
        .radio-label input:checked + span {
            background: #1e90ff;
            border-color: #1e90ff;
            color: #ffffff;
            box-shadow: 0 2px 6px rgba(30, 144, 255, 0.3);
        }

        /* メモ */
        .memo-container { margin-top: 25px; }
        .memo-input {
            width: 100%; height: 100px; padding: 12px; border-radius: 10px; border: 1px solid #d0d0d0;
            font-size: 16px; box-sizing: border-box; resize: none; font-family: inherit;
        }

        /* 進捗 */
        #status-msg { text-align: center; margin-top: 20px; font-weight: bold; min-height: 24px; }
        .progress-area { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-top: 10px; }
        .progress-text { font-size: 14px; font-weight: bold; margin-bottom: 8px; text-align: right; }
        .progress-bar-bg { width: 100%; background: #e0e0e0; border-radius: 10px; height: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: #1e90ff; width: 0%; transition: width 0.4s ease; }

        /* リセット */
        .reset-container { margin-top: 30px; text-align: center; }
        .reset-msg { font-size: 14px; font-weight: bold; margin-bottom: 10px; }
        .btn-reset { width: 100%; background: #b22222; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: bold; }

        .footer { text-align: center; font-size: 10px; color: #bbb; margin-top: 30px; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>登録前チェックリスト</h1>
    <p class="desc1">ご提案したこと、お伝えしたことに<br>チェックを入れてください</p>
    
    <p class="warning-text">
        ミス防止のため、全てのチェックが終わってから<br>
        登録をはじめましょう
    </p>

    <p class="desc2">(<span class="opt-word">オプション項目</span>と<span class="split-word">分割リセット項目</span>は必須ではないので<br>チェックしてもしなくても進捗には反映されません)</p>

    <div class="tabs">
        <div class="tab active" onclick="switchTab(0)" id="tab-btn-0">お客様 1</div>
        <div class="tab" onclick="switchTab(1)" id="tab-btn-1">お客様 2</div>
        <div class="tab" onclick="switchTab(2)" id="tab-btn-2">お客様 3</div>
    </div>

    <div class="name-container">
        <input type="text" id="customer-name" class="name-input" placeholder="カタカナで名字のみ">
        <span class="name-suffix">様</span>
    </div>

    <div class="timer-container">
        <div class="timer-label">接客時間</div>
        <div id="time-display" class="timer-display">00:00</div>
        <div class="timer-btns">
            <button class="btn-timer btn-start" id="btn-start" onclick="toggleTimer(true)">開始</button>
            <button class="btn-timer btn-stop" onclick="stopTimerBtn()">終了</button>
        </div>
    </div>

    <div class="section-title">事前確認</div>
    <div class="checklist">
        <label class="check-item"><input type="checkbox" class="cb" value="pre1"> GL / インカム報告</label>
        <label class="check-item"><input type="checkbox" class="cb" value="pre2"> モバイル会員読取</label>
    </div>

    <div class="section-title">登録前必須項目</div>
    <div class="checklist">
        <label class="check-item"><input type="checkbox" class="cb req" value="r1"> キャッシュカード/クレジットカードの所持</label>
        <label class="check-item"><input type="checkbox" class="cb req" value="r2"> 身分証明書の所持</label>
        <label class="check-item"><input type="checkbox" class="cb req" value="r3"> メール持ち運びの有無</label>
        <label class="check-item"><input type="checkbox" class="cb req" value="r4"> 頭金の説明</label>
        <label class="check-item"><input type="checkbox" class="cb req" value="r5"> 事務手数料の説明</label>
        <label class="check-item"><input type="checkbox" class="cb req" value="r6"> データ移行のご提案</label>
        <label class="check-item"><input type="checkbox" class="cb req" value="r7"> 補償のご提案</label>
        <label class="check-item"><input type="checkbox" class="cb req" value="r8"> 同意書登録</label>
        <label class="check-item"><input type="checkbox" class="cb req" value="r9"> ノートンのご提案</label>
        <label class="check-item bb-item"><input type="checkbox" class="cb req" value="b1"> ラック検索</label>
        <label class="check-item bb-item"><input type="checkbox" class="cb req" value="b2"> BBのご提案</label>
    </div>

    <div class="section-title">分割リセット項目</div>
    <div class="checklist">
        <label class="check-item split-item"><input type="checkbox" class="cb" value="s1"> 分割リセット審査完了</label>
        <label class="check-item split-item"><input type="checkbox" class="cb" value="s2"> 分割リセット口座登録</label>
    </div>

    <div class="section-title">オプション</div>
    <div class="checklist" style="margin-bottom: 20px;">
        <label class="check-item optional"><input type="checkbox" class="cb" value="o2"> でんきのご提案</label>
    </div>

    <div class="section-title" style="margin-top: 10px;">補償･データ移行内容</div>
    
    <div class="decision-group">
        <div class="decision-title">補償プラン（複数選択可）</div>
        <div class="radio-row">
            <label class="radio-label"><input type="checkbox" class="cb" value="w_lump_sum"><span>補償(一括)</span></label>
            <label class="radio-label"><input type="checkbox" class="cb" value="w_monthly"><span>補償(月額)</span></label>
            <label class="radio-label"><input type="checkbox" class="cb" value="w_carrier"><span>キャリア補償</span></label>
            <label class="radio-label"><input type="checkbox" class="cb" value="w_battery"><span>バッテリー補償</span></label>
            <label class="radio-label"><input type="checkbox" class="cb" value="w_marutto"><span>まるっとパック</span></label>
            <label class="radio-label"><input type="checkbox" class="cb" value="w_none"><span>補償なし</span></label>
        </div>
    </div>

    <div class="decision-group">
        <div class="decision-title">データ移行</div>
        <div class="radio-row">
            <label class="radio-label"><input type="radio" class="rb" name="data_transfer" value="full"><span>完全移行</span></label>
            <label class="radio-label"><input type="radio" class="rb" name="data_transfer" value="pack"><span>安心パック内</span></label>
            <label class="radio-label"><input type="radio" class="rb" name="data_transfer" value="none"><span>移行なし</span></label>
        </div>
    </div>

    <div class="memo-container">
        <textarea id="memo" class="memo-input" placeholder="メモしたいことを入力してください"></textarea>
    </div>

    <div id="status-msg"></div>
    <div class="progress-area">
        <div class="progress-text">進捗: <span id="percent">0</span>%</div>
        <div class="progress-bar-bg"><div id="bar" class="progress-bar-fill"></div></div>
    </div>

    <div class="reset-container">
        <p class="reset-msg">使い終わったらリセットボタンを押してください</p>
        <button class="btn-reset" onclick="manualReset()">一括リセット</button>
    </div>

    <div class="footer">染谷作成 更新日2026.06.26</div>
</div>

<script>
    let currentTab = 0;
    let customers = [
        { name: "", timerActive: false, seconds: 0, checks: {}, radios: {}, memo: "" },
        { name: "", timerActive: false, seconds: 0, checks: {}, radios: {}, memo: "" },
        { name: "", timerActive: false, seconds: 0, checks: {}, radios: {}, memo: "" }
    ];

    const savedData = localStorage.getItem('someya_multi_app');
    if (savedData) { 
        customers = JSON.parse(savedData); 
        customers.forEach(c => {
            if (!c.radios) c.radios = {};
        });
    }

    const nameInput = document.getElementById('customer-name');
    const memoInput = document.getElementById('memo');
    const allCheckboxes = document.querySelectorAll('.cb');
    const allRadios = document.querySelectorAll('.rb'); 
    const btnStart = document.getElementById('btn-start');
    const timeDisplay = document.getElementById('time-display');

    let isComposing = false;
    nameInput.addEventListener('compositionstart', () => isComposing = true);
    nameInput.addEventListener('compositionend', function() {
        isComposing = false;
        formatToKatakana(this);
    });
    nameInput.addEventListener('input', function() {
        if (!isComposing) formatToKatakana(this);
        else saveData();
    });

    function formatToKatakana(element) {
        let val = element.value.replace(/[\u3041-\u3096]/g, match => String.fromCharCode(match.charCodeAt(0) + 0x60));
        val = val.replace(/[^ァ-ヶー]/g, '');
        if (element.value !== val) element.value = val;
        saveData();
    }

    function saveData() {
        let c = customers[currentTab];
        c.name = nameInput.value;
        c.memo = memoInput.value;
        
        allCheckboxes.forEach(cb => { c.checks[cb.value] = cb.checked; });
        
        c.radios = {};
        document.querySelectorAll('.rb:checked').forEach(rb => {
            c.radios[rb.name] = rb.value;
        });

        localStorage.setItem('someya_multi_app', JSON.stringify(customers));
        updateTabNames();
    }

    function renderTab() {
        let c = customers[currentTab];
        nameInput.value = c.name;
        memoInput.value = c.memo;
        
        allCheckboxes.forEach(cb => { cb.checked = !!c.checks[cb.value]; });
        
        allRadios.forEach(rb => {
            rb.checked = (c.radios && c.radios[rb.name] === rb.value);
        });

        for (let i = 0; i < 3; i++) {
            const t = document.getElementById('tab-btn-' + i);
            t.className = i === currentTab ? 'tab active' : 'tab';
        }
        btnStart.style.backgroundColor = c.timerActive ? "#3cb371" : "#4682b4";
        btnStart.innerText = c.timerActive ? "計測中" : "開始";
        updateTimeDisplay(c.seconds);
        updateProgress();
        updateTabNames();
    }

    window.switchTab = (index) => {
        saveData();
        currentTab = index;
        renderTab();
    };

    function updateTabNames() {
        for (let i = 0; i < 3; i++) {
            const t = document.getElementById('tab-btn-' + i);
            const n = customers[i].name;
            t.innerText = n ? n + " 様" : "お客様 " + (i + 1);
        }
    }

    memoInput.addEventListener('input', saveData);
    allCheckboxes.forEach(cb => {
        cb.addEventListener('change', () => { saveData(); updateProgress(); });
    });
    allRadios.forEach(rb => {
        rb.addEventListener('change', () => { saveData(); });
    });

    setInterval(() => {
        let needsSave = false;
        customers.forEach(c => { if (c.timerActive) { c.seconds++; needsSave = true; } });
        if (needsSave) {
            updateTimeDisplay(customers[currentTab].seconds);
            localStorage.setItem('someya_multi_app', JSON.stringify(customers));
        }
    }, 1000);

    function updateTimeDisplay(sec) {
        const m = Math.floor(sec / 60).toString().padStart(2, '0');
        const s = (sec % 60).toString().padStart(2, '0');
        timeDisplay.innerText = `${m}:${s}`;
    }

    window.toggleTimer = (forceStart = false) => {
        let c = customers[currentTab];
        if (forceStart && c.timerActive) return;
        c.timerActive = forceStart;
        saveData();
        renderTab();
    };

    window.stopTimerBtn = () => {
        let c = customers[currentTab];
        c.timerActive = false;
        saveData();
        renderTab();
        if (confirm("お疲れ様でした！全てリセットしますか？")) resetCurrentData();
    };

    function updateProgress() {
        const reqs = document.querySelectorAll('.req');
        const checked = document.querySelectorAll('.req:checked').length;
        const percent = Math.floor((checked / reqs.length) * 100);
        document.getElementById('percent').innerText = percent;
        document.getElementById('bar').style.width = percent + '%';
        const msg = document.getElementById('status-msg');
        if (checked === 0) msg.innerText = "";
        else if (checked < reqs.length) { msg.innerText = "チェック漏れがあります。確認してください"; msg.style.color = "#b22222"; }
        else { msg.innerText = "全てチェック済です。お疲れ様でした。"; msg.style.color = "#4682b4"; }
    }

    function resetCurrentData() {
        customers[currentTab] = { name: "", timerActive: false, seconds: 0, checks: {}, radios: {}, memo: "" };
        nameInput.value = "";
        memoInput.value = "";
        allCheckboxes.forEach(cb => cb.checked = false);
        allRadios.forEach(rb => rb.checked = false);
        saveData();
        renderTab();
        window.scrollTo(0,0);
    }

    window.manualReset = () => {
        if(confirm("お疲れ様でした。全てリセットして次の接客の準備をしますか？\n（現在開いているお客様のデータのみ消去されます）")) resetCurrentData();
    };

    window.onload = () => renderTab();
</script>
</body>
</html>
